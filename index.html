<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人文学におけるデジタルツール活用の手引き</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1A365D;
      color: #fff;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-download {
      background: #E67E22;
      color: #fff;
    }

    .btn-download:hover { background: #d35400; }

    .btn-open {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .btn-open:hover { background: rgba(255,255,255,0.25); }

    .btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .viewer-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .pdf-frame {
      flex: 1;
      min-height: 80vh;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      background: #fff;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.8rem;
      color: #888;
    }

    footer a { color: #1A365D; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      header { padding: 1rem; }
      header h1 { font-size: 1.1rem; }
      .viewer-container { padding: 0.5rem; }
      .pdf-frame { min-height: 70vh; border-radius: 4px; }
      .btn { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>人文学におけるデジタルツール活用の手引き</h1>
    <div class="header-actions">
      <a href="manual.pdf" target="_blank" class="btn btn-open">
        <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
        別タブで開く
      </a>
      <a href="manual.pdf" download="人文学におけるデジタルツール活用の手引き.pdf" class="btn btn-download">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        ダウンロード
      </a>
    </div>
  </header>

  <div class="viewer-container">
    <iframe
      class="pdf-frame"
      src="manual.pdf"
      title="PDF Viewer"
    ></iframe>
  </div>

  <footer>
    &copy; 2026 Yuki Sugawara &mdash;
    <a href="https://github.com/yukisugawara/digital-tools-manual">GitHub</a>
  </footer>
</body>
</html>
